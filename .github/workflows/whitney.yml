name: Mt Whitney Day-Use Watcher

on:
  schedule:
    # Every 10 minutes. GitHub may delay scheduled runs under load, so the real
    # cadence is often 10-20 min. Keep the repo PUBLIC for unlimited free minutes.
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      test:
        description: 'Send a test Telegram message and exit (does not check permits)'
        type: boolean
        default: false

# Allow the job to commit the small state.json (dedup memory) back to the repo.
permissions:
  contents: write

# Never run two checks at once.
concurrency:
  group: whitney-watcher
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_ALERT: ${{ (github.event_name == 'workflow_dispatch' && inputs.test) && '1' || '0' }}
        run: node check.js

      - name: Persist dedup state
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.test }}
        run: |
          git config user.name "whitney-watcher[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "state: update [skip ci]" || echo "no state change"
          git push || echo "nothing to push"
